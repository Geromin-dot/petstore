services:
  - type: web
    name: petstore-backend
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    branch: main
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: petstore-db
          property: jdbcInternalConnectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: petstore-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: petstore-db
          property: password
      - key: DATABASE_PLATFORM
        value: org.hibernate.dialect.PostgreSQLDialect

  - type: web
    name: petstore-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    branch: main
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: petstore-backend
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: petstore-db
    databaseName: petstore
    region: oregon
    plan: free
